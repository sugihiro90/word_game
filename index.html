<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3 ROUNDS WORD GAME</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; min-height: 500px; display: flex; flex-direction: column; }
        .hidden { display: none; }
        button { background: #007bff; color: white; border: none; padding: 16px; font-size: 16px; border-radius: 12px; cursor: pointer; margin: 8px 0; width: 100%; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button.secondary { background: #6c757d; }
        button.outline { background: transparent; border: 2px solid #007bff; color: #007bff; }
        
        select, input { padding: 12px; font-size: 16px; width: 90%; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; }
        .setting-group { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: left; }
        .setting-label { font-weight: bold; font-size: 14px; color: #555; display: block; margin-bottom: 5px; }

        .team-tag { display: inline-block; padding: 5px 20px; border-radius: 20px; color: white; font-weight: bold; margin-bottom: 10px; }
        .team-a { background: #e67e22; }
        .team-b { background: #9b59b6; }

        .word-display { font-size: 30px; font-weight: bold; margin: 20px 0; min-height: 120px; display: flex; align-items: center; justify-content: center; border: 3px solid #eee; border-radius: 15px; background: #fff; }
        .stats-box { text-align: left; background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .stats-item { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

<div class="card">
    <div id="title-screen">
        <h1 style="color:#007bff; margin-top:40px; font-size: 42px;">3 ROUNDS<br>WORD GAME</h1>
        <div style="margin-top: 60px;">
            <button onclick="showScreen('setup-screen')">ゲームスタート</button>
            <button class="outline" onclick="showScreen('rule-screen')">ルール説明</button>
        </div>
    </div>

    <div id="rule-screen" class="hidden">
        <h2>ルール</h2>
        <div style="text-align:left; font-size:14px; line-height:1.6; background:#f8f9fa; padding:15px; border-radius:10px; margin-bottom:15px;">
            同じ単語リストで3回戦います。<br><br>
            <strong>R1：説明</strong> (言葉で伝える)<br>
            <strong>R2：一言</strong> (ヒントは1単語だけ)<br>
            <strong>R3：ジェスチャー</strong> (無言で動く)
        </div>
        <button class="secondary" onclick="showScreen('title-screen')">戻る</button>
    </div>

    <div id="setup-screen" class="hidden">
        <h2>対戦設定</h2>
        <div class="setting-group">
            <span class="setting-label">Aチームの人数 (オレンジ)</span>
            <select id="count-a"></select>
            <span class="setting-label">Bチームの人数 (パープル)</span>
            <select id="count-b"></select>
        </div>
        <div class="setting-group">
            <span class="setting-label">1人あたりの単語数</span>
            <select id="words-count"></select>
        </div>
        <div style="margin: 10px 0; font-size: 14px;">
            <input type="checkbox" id="show-author-setting" checked style="width:auto;"> 最後に名前を表示する
        </div>
        <button onclick="initPlayers()">次へ</button>
    </div>

    <div id="input-screen" class="hidden">
        <div id="input-team-tag" class="team-tag"></div>
        <h2 id="input-user-title"></h2>
        <input type="text" id="user-name" placeholder="プレイヤー名を入力">
        <div id="word-inputs-container"></div>
        <button id="save-btn" onclick="saveCurrentPlayer()">登録して次へ</button>
    </div>

    <div id="ready-screen" class="hidden">
        <div id="current-team-tag" class="team-tag"></div>
        <h2 id="round-info"></h2>
        <p style="font-size:18px;">次は <strong><span id="next-player-name"></span></strong> さん！</p>
        <p id="round-desc" style="color:#666; font-size:14px;"></p>
        <div style="margin:10px 0;">A: <span id="score-a">0</span> | B: <span id="score-b">0</span></div>
        <button onclick="startTurn()">準備OK！スタート</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="game-team-tag" class="team-tag"></div>
        <div style="font-size:24px; color:red; font-weight:bold;">残り: <span id="time-left"></span>秒</div>
        <div class="word-display" id="current-word"></div>
        <div id="action-buttons" class="hidden">
            <button style="background:#28a745;" onclick="correctAnswer()">正解！</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h1 id="winner-text"></h1>
        <div id="final-scores" style="font-size:20px; margin-bottom:20px;"></div>
        <div class="stats-box">
            <div style="font-weight:bold; border-bottom:2px solid #007bff; margin-bottom:10px;">🏆 プレイヤー回答速度ランク</div>
            <div id="player-ranking"></div>
        </div>
        <div class="stats-box">
            <div style="font-weight:bold; border-bottom:2px solid #007bff; margin-bottom:10px;">💎 単語正解スピードランク</div>
            <div id="word-ranking"></div>
        </div>
        <button onclick="location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
    function createOptions(id, min, max) {
        const sel = document.getElementById(id);
        for(let i=min; i<=max; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.text = i + (id.includes('count') ? '人' : '個');
            if(i===2 && id.includes('count')) opt.selected = true;
            if(i===3 && id==='words-count') opt.selected = true;
            sel.appendChild(opt);
        }
    }
    createOptions('count-a', 1, 10);
    createOptions('count-b', 1, 10);
    createOptions('words-count', 1, 5);

    let playersA = [], playersB = [], allWordObjects = [], solveRecords = [];
    let currentPool = [], scores = {A:0, B:0}, round = 1;
    let turnTeam = 'A', indexA = 0, indexB = 0;
    let timer, timeLeft, startTime, showAuthor;

    const roundData = [
        { name: "Round 1: 説明", desc: "言葉で説明して！(単語そのものはNG)" },
        { name: "Round 2: 一言", desc: "ヒントは「一単語」だけ！" },
        { name: "Round 3: ジェスチャー", desc: "声を出さずに動きだけで！" }
    ];

    function showScreen(id) {
        document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function initPlayers() {
        showAuthor = document.getElementById('show-author-setting').checked;
        playersA = []; playersB = []; allWordObjects = [];
        showInputFor('A', 0);
    }

    function showInputFor(team, idx) {
        const count = parseInt(document.getElementById('count-' + team.toLowerCase()).value);
        if (idx >= count) {
            if (team === 'A') return showInputFor('B', 0);
            else return startRoundSetup();
        }
        
        const tag = document.getElementById('input-team-tag');
        tag.innerText = team + "チーム";
        tag.className = "team-tag team-" + team.toLowerCase();
        document.getElementById('input-user-title').innerText = `プレイヤー ${idx + 1} の登録`;
        document.getElementById('user-name').value = "";
        
        const container = document.getElementById('word-inputs-container');
        container.innerHTML = "";
        const wCount = document.getElementById('words-count').value;
        for(let i=0; i<wCount; i++) {
            const inp = document.createElement('input');
            inp.placeholder = `単語 ${i+1}`;
            inp.className = "word-input";
            container.appendChild(inp);
        }
        showScreen('input-screen');
        
        window.saveCurrentPlayer = () => {
            const name = document.getElementById('user-name').value.trim() || `Player ${idx+1}`;
            const words = document.querySelectorAll('.word-input');
            if (team === 'A') playersA.push(name); else playersB.push(name);
            words.forEach(w => allWordObjects.push({text: w.value.trim(), author: name}));
            showInputFor(team, idx + 1);
        };
    }

    function startRoundSetup() {
        if (round > 3) return showFinalResults();
        if (round > 1 && scores.A !== scores.B) turnTeam = (scores.A < scores.B) ? 'A' : 'B';
        currentPool = [...allWordObjects];
        shuffle(currentPool);
        showScreen('ready-screen');
        updateReadyScreen();
    }

    function updateReadyScreen() {
        const name = (turnTeam === 'A') ? playersA[indexA] : playersB[indexB];
        const tag = document.getElementById('current-team-tag');
        tag.innerText = turnTeam + "チーム";
        tag.className = "team-tag team-" + turnTeam.toLowerCase();
        document.getElementById('round-info').innerText = roundData[round-1].name;
        document.getElementById('round-desc').innerText = roundData[round-1].desc;
        document.getElementById('next-player-name').innerText = name;
        document.getElementById('score-a').innerText = scores.A;
        document.getElementById('score-b').innerText = scores.B;
    }

    function startTurn() {
        showScreen('game-screen');
        timeLeft = 60;
        document.getElementById('time-left').innerText = timeLeft;
        document.getElementById('game-team-tag').innerText = turnTeam + "チーム";
        document.getElementById('game-team-tag').className = "team-tag team-" + turnTeam.toLowerCase();
        
        setupWord();
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                alert("タイムアップ！交代です。");
                turnTeam = (turnTeam === 'A') ? 'B' : 'A';
                startRoundSetup();
            }
        }, 1000);
    }

    function setupWord() {
        if (currentPool.length === 0) {
            clearInterval(timer);
            alert("ラウンド終了！");
            round++;
            startRoundSetup();
            return;
        }
        document.getElementById('action-buttons').classList.add('hidden');
        document.getElementById('current-word').innerHTML = `<button class="outline" onclick="reveal()">タップして表示</button>`;
    }

    function reveal() {
        startTime = Date.now();
        document.getElementById('current-word').innerText = currentPool[0].text;
        document.getElementById('action-buttons').classList.remove('hidden');
    }

    function correctAnswer() {
        const duration = (Date.now() - startTime) / 1000;
        const solverName = (turnTeam === 'A') ? playersA[indexA] : playersB[indexB];
        solveRecords.push({ text: currentPool[0].text, author: currentPool[0].author, solver: solverName, time: duration, team: turnTeam });
        
        scores[turnTeam]++;
        currentPool.shift();
        shuffle(currentPool);
        
        if (turnTeam === 'A') indexA = (indexA + 1) % playersA.length;
        else indexB = (indexB + 1) % playersB.length;

        setupWord();
    }

    function showFinalResults() {
        showScreen('result-screen');
        document.getElementById('winner-text').innerText = scores.A > scores.B ? "Aチーム勝利！" : (scores.B > scores.A ? "Bチーム勝利！" : "引き分け！");
        document.getElementById('final-scores').innerText = `A: ${scores.A} | B: ${scores.B}`;

        const pStats = {};
        solveRecords.forEach(r => {
            if(!pStats[r.solver]) pStats[r.solver] = {t:0, c:0};
            pStats[r.solver].t += r.time; pStats[r.solver].c++;
        });
        const pRank = Object.keys(pStats).map(n => ({n, avg: pStats[n].t / pStats[n].c})).sort((a,b)=>a.avg-b.avg);
        document.getElementById('player-ranking').innerHTML = pRank.map((p,i)=>`<div class="stats-item"><span>${i+1}. ${p.n}</span><span>${p.avg.toFixed(1)}s</span></div>`).join('');

        const wStats = {};
        solveRecords.forEach(r => {
            if(!wStats[r.text]) wStats[r.text] = {t:0, c:0, a:r.author};
            wStats[r.text].t += r.time; wStats[r.text].c++;
        });
        const wRank = Object.keys(wStats).map(txt => ({txt, avg: wStats[txt].t / wStats[txt].c, a: wStats[txt].a})).sort((a,b)=>a.avg-b.avg);
        document.getElementById('word-ranking').innerHTML = wRank.slice(0,10).map((w,i)=>`<div class="stats-item"><span>${i+1}. ${w.txt}${showAuthor?' <small>('+w.a+')</small>':''}</span><span>${w.avg.toFixed(1)}s</span></div>`).join('');
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
</script>
</body>
</html>
